name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-type-test:
    name: Lint, type-check, and test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff (lint)
        run: ruff check .

      - name: Ruff (format check)
        run: ruff format --check .

      - name: Mypy (strict types)
        run: mypy app

      - name: Pytest with coverage
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml

      - name: Repo size guard (<10 MB tracked)
        run: |
          total_kb=$(git ls-files | xargs -I{} du -k "{}" | awk '{s+=$1} END {print s+0}')
          echo "Tracked size: ${total_kb} KB"
          if [ "${total_kb}" -gt 10240 ]; then
            echo "Repo exceeds 10 MB"
            exit 1
          fi
